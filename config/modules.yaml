host: 0.0.0.0
port: 8080
paths:
  project_root: /data/sinuo_project
  ros_setup: /opt/ros/humble/setup.bash
  object_detection_python: /home/nvidia1/miniforge3/envs/zhaigou/bin/python
monitor_setups:
  - ${project_root}/mid_ws/install/setup.bash
log_dir: runtime/logs
state_dir: runtime/state
stop_timeout_sec: 8

modules:
  lidar:
    name: MID360
    category: sensor
    domain_id: 10
    workdir: ${project_root}/mid_ws
    setup: install/setup.bash
    env:
      LD_LIBRARY_PATH: ${project_root}/mid_ws/src/livox_ros_driver2/Livox-SDK2/lib/arm64:${LD_LIBRARY_PATH}
    cmd: ["ros2", "launch", "livox_ros_driver2", "msg_MID360_launch.py"]
    autostart: true
    restart_on_crash: true
    startup_delay: 3
    health_nodes: ["/livox_lidar_publisher"]
    monitor_topics: ["/livox/lidar"]

  imu:
    name: N300pro IMU
    category: sensor
    domain_id: 10
    workdir: ${project_root}/n300_pro_ws
    setup: install/setup.bash
    cmd: ["ros2", "launch", "hipnuc_imu", "imu_spec_msg.launch.py"]
    autostart: true
    restart_on_crash: true
    startup_delay: 2
    health_nodes: ["/IMU_publisher"]
    monitor_topics: ["/IMU_data"]

  g90_rtk:
    name: G90 RTK/GPS
    category: sensor
    domain_id: 10
    workdir: ${project_root}/G90_ws
    setup: install/setup.bash
    cmd: ["ros2", "launch", "wheeltec_gps_driver", "wheeltec_dual_rtk_driver_unicore.launch.py"]
    autostart: true
    restart_on_crash: true
    startup_delay: 2
    monitor_topics: ["/gps/rtk_odom"]

  depth_camera:
    name: RGB-D
    category: sensor
    domain_id: 20
    workdir: ${project_root}/orb_ws
    setup: install/setup.bash
    cmd:
      - ros2
      - launch
      - orbbec_camera
      - gemini_330_series.launch.py
      - color_width:=640
      - color_height:=400
      - color_fps:=30
      - enable_color:=true
      - enable_depth:=false
      - enable_point_cloud:=false
      - enable_colored_point_cloud:=false
      - enable_left_ir:=false
      - enable_right_ir:=false
      - enable_accel:=false
      - enable_gyro:=false
      - depth_registration:=false
      - enable_d2c_viewer:=false
      - publish_tf:=false
    autostart: true
    restart_on_crash: true
    startup_delay: 3
    monitor_topics: ["/camera/color/image_raw"]

  fast_lio:
    name: FAST-LIO
    category: algorithm
    domain_id: 10
    workdir: ${project_root}/mid_ws
    setup: install/setup.bash
    cmd: ["ros2", "launch", "fast_lio", "mapping.launch.py", "rviz:=false"]
    autostart: true
    restart_on_crash: true
    depends_on: ["lidar", "imu"]
    startup_delay: 3
    health_nodes: ["/laserMapping"]
    health_topics: ["/Odometry", "/cloud_registered"]
    monitor_topics: ["/Odometry"]

  domain_bridge:
    name: 域桥 plus
    category: algorithm
    domain_id: 20
    workdir: ${project_root}/bridge_info_joint_new
    setup: install/setup.bash
    cmd: ["ros2", "run", "domain_bridge_cpp", "domain_bridge_event_bundle"]
    autostart: true
    restart_on_crash: true
    depends_on: ["depth_camera"]
    startup_delay: 1

  object_detection:
    name: 目标检测
    category: algorithm
    domain_id: 20
    workdir: ${project_root}/object_detection/26_4_9
    cmd: ["${object_detection_python}"]
    python_script: "导航-all2-单侧点云-先验更远-目标范围-先验选点优化-读取内参-先验姿态优化.py"
    autostart: true
    restart_on_crash: true
    depends_on: ["depth_camera", "domain_bridge"]
    startup_delay: 2

  auto_explore:
    name: 导航模块
    category: algorithm
    domain_id: 10
    workdir: ${project_root}/Auto_Explor_ws
    setup: install/setup.bash
    cmd: ["ros2", "launch", "vehicle_simulator", "system_real_robot.launch"]
    autostart: false
    restart_on_crash: false
    depends_on: ["fast_lio", "robot_controller", "g90_rtk"]
    startup_delay: 3
    monitor_topics: ["/cmd_vel"]

  waypoint:
    name: Waypoint
    category: algorithm
    domain_id: 10
    workdir: ${project_root}/Auto_Explor_ws
    setup: install/setup.bash
    cmd: ["ros2", "launch", "waypoint_example", "waypoint_example_garage.launch"]
    autostart: false
    restart_on_crash: false
    depends_on: ["auto_explore"]

  robot_controller:
    name: 底盘控制
    category: control
    domain_id: 10
    workdir: ${project_root}/robot_contor_ws
    setup: install/setup.bash
    cmd: ["ros2", "run", "keya_robot_controller", "robot_controller_node"]
    autostart: false
    restart_on_crash: true
    startup_delay: 1
    health_nodes: ["/robot_controller"]
