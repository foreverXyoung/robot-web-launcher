<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Robot Web Launcher</title>
  <style>
    :root { color-scheme: dark; font-family: system-ui, "Microsoft YaHei", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-width: 0; background: #0b1020; color: #e9eefc; }
    header { padding: 18px 24px; background: #111936; display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 20px; margin: 0; }
    main { padding: 20px; display: grid; grid-template-columns: minmax(820px, 1.2fr) minmax(420px, 0.8fr); gap: 18px; }
    .card { min-width: 0; background: #121a33; border: 1px solid #273254; border-radius: 14px; overflow: hidden; }
    .toolbar { padding: 12px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid #273254; }
    .category-bar { padding: 12px; display: flex; gap: 10px; flex-wrap: wrap; border-bottom: 1px solid #273254; background: #0f1730; }
    .category-card { border: 1px solid #2b375c; border-radius: 12px; padding: 10px; min-width: 210px; background: #151f3d; }
    .category-title { font-weight: 700; margin-bottom: 8px; }
    button { min-height: 38px; border: 0; border-radius: 9px; padding: 8px 12px; color: white; background: #2c63ff; cursor: pointer; touch-action: manipulation; }
    button.stop { background: #d94b5d; }
    button.restart { background: #7a5cff; }
    button.secondary { background: #31405f; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    select { min-height: 38px; border: 1px solid #31405f; border-radius: 9px; padding: 8px 10px; color: #e9eefc; background: #0e1730; }
    input[type="text"], input[type="number"] { min-height: 38px; border: 1px solid #31405f; border-radius: 9px; padding: 8px 10px; color: #e9eefc; background: #0e1730; }
    input[type="checkbox"] { width: 18px; height: 18px; accent-color: #2c63ff; cursor: pointer; }
    input[type="radio"] { width: 17px; height: 17px; accent-color: #2c63ff; cursor: pointer; }
    .table-wrap { width: 100%; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 10px; border-bottom: 1px solid #24304f; text-align: left; vertical-align: middle; }
    th { color: #aab8df; font-weight: 600; }
    tr:hover { background: #172140; }
    .host-section-row td { padding: 12px 10px 8px; background: #0f1730; border-bottom: 1px solid #334066; }
    .host-section { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .host-section-title { font-size: 16px; font-weight: 800; }
    .host-section-meta { color: #9aa8ce; font-size: 13px; }
    .status, .pill { padding: 3px 8px; border-radius: 999px; background: #37415e; display: inline-block; }
    .running, .starting { background: #176b48; color: #c7ffe5; }
    .crashed { background: #7c2333; color: #ffd5dc; }
    .stopping { background: #75551b; color: #ffe7b1; }
    .sensor { background: #1d5f78; color: #d8f7ff; }
    .algorithm { background: #4b4775; color: #eee8ff; }
    .control { background: #66501e; color: #ffe9b5; }
    .rate-ok { color: #8dffc5; }
    .rate-bad { color: #ffb1bd; }
    .check-ok { color: #8dffc5; }
    .check-bad { color: #ffb1bd; }
    .actions, .action-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
    .recorder-panel { padding: 12px; display: grid; gap: 10px; border-bottom: 1px solid #273254; background: #101832; }
    .recorder-title { font-weight: 700; }
    .recorder-grid { display: grid; grid-template-columns: minmax(220px, 1fr) minmax(120px, .4fr) minmax(190px, .7fr) auto auto; gap: 8px; align-items: end; }
    .radio-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .radio-row label, .field label { color: #aab8df; font-size: 13px; }
    .field { display: grid; gap: 4px; }
    .recorder-status { display: flex; gap: 12px; flex-wrap: wrap; color: #9aa8ce; font-size: 13px; overflow-wrap: anywhere; }
    #logs { height: calc(100vh - 165px); overflow: auto; padding: 12px; background: #060912; font-family: ui-monospace, Consolas, monospace; font-size: 13px; white-space: pre-wrap; }
    .log-line { margin: 0 0 4px; }
    .muted { color: #9aa8ce; }
    .module { color: #89b4ff; }
    @media (max-width: 1180px) {
      main { grid-template-columns: 1fr; }
      table { min-width: 900px; }
      #logs { height: 420px; }
    }
    @media (max-width: 720px) {
      header { padding: 12px; gap: 6px 12px; align-items: flex-start; flex-wrap: wrap; }
      h1 { width: 100%; font-size: 17px; }
      main { padding: 8px; gap: 10px; }
      .card { border-radius: 10px; }
      .category-bar { display: grid; grid-template-columns: 1fr; padding: 8px; gap: 8px; }
      .category-card { min-width: 0; padding: 10px; }
      .category-card .actions { display: grid; grid-template-columns: 1fr 1fr; }
      .category-card .actions .secondary { grid-column: 1 / -1; }
      .recorder-panel { padding: 8px; }
      .recorder-grid { grid-template-columns: 1fr; }
      .recorder-grid button { width: 100%; }
      .toolbar { padding: 8px; gap: 7px; }
      .toolbar button { flex: 1 1 calc(50% - 7px); }
      .toolbar select { flex: 1 1 100%; width: 100%; }
      #monitorState { flex: 1 0 100%; order: 10; padding: 2px 3px; font-size: 13px; }
      .table-wrap { overflow: visible; padding: 8px; }
      table, tbody, tr, td { display: block; width: 100%; }
      table { min-width: 0; }
      thead { display: none; }
      tbody { display: grid; gap: 9px; }
      tr { padding: 7px 0; border: 1px solid #2b375c; border-radius: 10px; background: #10182f; overflow: hidden; }
      tr.host-section-row { padding: 0; border: 0; border-radius: 0; background: transparent; }
      .host-section-row td { display: block; padding: 8px 2px 0; background: transparent; border: 0; }
      .host-section-row td::before { content: none; }
      .host-section { padding: 10px; border: 1px solid #2b375c; border-radius: 10px; background: #0f1730; }
      tr:hover { background: #10182f; }
      td { display: grid; grid-template-columns: 82px minmax(0, 1fr); gap: 8px; align-items: center; padding: 6px 10px; border: 0; overflow-wrap: anywhere; }
      td::before { content: attr(data-label); color: #8796bf; font-size: 12px; font-weight: 600; }
      td.module-actions { align-items: start; }
      .action-buttons { display: grid; grid-template-columns: repeat(3, 1fr); }
      .action-buttons button { min-width: 0; padding: 8px 5px; }
      input[type="checkbox"] { width: 22px; height: 22px; }
      #logs { height: 45vh; min-height: 280px; max-height: 520px; font-size: 12px; overflow-wrap: anywhere; }
    }
  </style>
</head>
<body>
  <header>
    <h1>拉风机器人 ROS2 模块控制台</h1>
    <div class="muted" id="wsState">连接中...</div>
  </header>

  <main>
    <section class="card">
      <div class="category-bar" id="categoryBar"></div>
      <div class="recorder-panel">
        <div class="recorder-title">数据录制</div>
        <div class="recorder-grid">
          <div class="field">
            <label>录制模式</label>
            <div class="radio-row" id="recorderModes"></div>
          </div>
          <div class="field">
            <label for="recorderDomain">Domain</label>
            <input id="recorderDomain" type="number" min="0" max="232" step="1" />
          </div>
          <div class="field">
            <label for="recorderName">文件名前缀</label>
            <input id="recorderName" type="text" placeholder="record" />
          </div>
          <button id="recorderStart" onclick="startRecorder()">开始录制</button>
          <button id="recorderStop" class="stop" onclick="stopRecorder()">停止录制</button>
        </div>
        <div class="recorder-status" id="recorderState">录制状态读取中...</div>
      </div>
      <div class="toolbar">
        <button onclick="startSelected()">启动勾选</button>
        <button class="stop" onclick="stopSelected()">关闭勾选</button>
        <button id="monitorToggle" class="secondary" onclick="toggleMonitor()">关闭频率监测</button>
        <span id="monitorState" class="muted">监测状态读取中...</span>
        <button class="secondary" onclick="selectAutostart()">勾选自启动</button>
        <button class="secondary" onclick="selectAll()">全选</button>
        <button class="secondary" onclick="clearSelection()">清空</button>
        <button class="secondary" onclick="refreshAll()">刷新状态/频率</button>
        <button class="secondary" onclick="loadConfigCheck(true)">配置检查</button>
        <span id="configCheckState" class="muted">配置尚未检查</span>
      </div>
      <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th><input type="checkbox" onchange="toggleAll(this.checked)" /></th>
            <th>主机</th>
            <th>模块</th>
            <th>分类</th>
            <th>Domain</th>
            <th>状态</th>
            <th>频率</th>
            <th>PID</th>
            <th>依赖</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="moduleRows"></tbody>
      </table>
      </div>
    </section>

    <section class="card">
      <div class="toolbar">
        <select id="logFilter" onchange="setLogFilter(this.value)" title="日志模块筛选">
          <option value="all">全部日志</option>
        </select>
        <button class="secondary" onclick="clearLogs()">清空日志</button>
      </div>
      <div id="logs"></div>
    </section>
  </main>

  <script>
    let modules = [];
    let categories = [];
    let rates = [];
    let monitorStatus = { enabled: false, started: false, error: null };
    let recorderStatus = { enabled: false, status: "stopped", modes: [] };
    let moduleRefreshTimer = null;
    let logFilter = "all";
    let logEntries = [];
    const selected = new Set();
    const categoryLabels = { sensor: "传感器驱动", algorithm: "算法模块", control: "控制接口" };

    async function api(path, options = {}) {
      const res = await fetch(path, {
        headers: { "Content-Type": "application/json" },
        ...options,
      });
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    async function runAction(label, action) {
      try {
        await action();
        await refreshAll();
      } catch (e) {
        appendLog({ time: new Date().toLocaleTimeString(), module: "system", message: `${label}失败: ${formatError(e)}` });
        await refreshAll();
      }
    }

    function formatError(e) {
      const text = String(e && e.message ? e.message : e);
      try {
        const payload = JSON.parse(text);
        return payload.detail || text;
      } catch (_err) {
        return text;
      }
    }

    async function refreshAll() {
      await loadModules();
      await loadMonitorStatus();
      await loadSensorRates();
      await loadRecorderStatus();
    }

    async function loadModules() {
      modules = await api("/api/modules");
      categories = await api("/api/categories");
      renderLogFilterOptions();
      renderCategories();
      renderModules();
    }

    async function loadSensorRates() {
      if (!monitorStatus.enabled) {
        rates = [];
        return;
      }
      try {
        rates = await api("/api/sensor-rates");
      } catch (e) {
        appendLog({ time: new Date().toLocaleTimeString(), module: "system", message: `频率刷新失败: ${e}` });
        rates = [];
      }
      renderModules();
    }

    async function loadMonitorStatus() {
      monitorStatus = await api("/api/monitor");
      renderMonitorStatus();
    }

    async function loadRecorderStatus() {
      recorderStatus = await api("/api/recorder");
      renderRecorder();
    }

    async function loadConfigCheck(showDetails = false) {
      const state = document.getElementById("configCheckState");
      try {
        const result = await api("/api/config-check");
        state.className = result.ok ? "check-ok" : "check-bad";
        state.textContent = result.ok
          ? `配置检查通过${result.warnings ? `，${result.warnings} 项警告` : ""}`
          : `配置存在 ${result.errors} 项错误，${result.warnings} 项警告`;
        if (showDetails) {
          const failures = result.checks.filter(item => !item.ok);
          if (failures.length === 0) {
            appendLog({ time: new Date().toLocaleTimeString(), module: "config", message: "所有路径和启动文件检查通过" });
          } else {
            failures.forEach(item => appendLog({
              time: new Date().toLocaleTimeString(),
              module: "config",
              message: `${item.severity === "warning" ? "警告" : "错误"} ${item.scope}.${item.field}: ${item.value}`,
            }));
          }
        }
      } catch (e) {
        state.className = "check-bad";
        state.textContent = `配置检查失败：${formatError(e)}`;
      }
    }

    async function toggleMonitor() {
      monitorStatus = await api("/api/monitor", {
        method: "POST",
        body: JSON.stringify({ enabled: !monitorStatus.enabled }),
      });
      if (!monitorStatus.enabled) rates = [];
      renderMonitorStatus();
      renderModules();
      if (monitorStatus.enabled) await loadSensorRates();
    }

    function renderMonitorStatus() {
      const button = document.getElementById("monitorToggle");
      const state = document.getElementById("monitorState");
      button.textContent = monitorStatus.enabled ? "关闭频率监测" : "开启频率监测";
      if (!monitorStatus.enabled) {
        state.textContent = "频率监测已关闭";
      } else if (monitorStatus.error) {
        state.textContent = `频率监测异常：${monitorStatus.error}`;
      } else {
        state.textContent = `频率监测器已开启，连续统计窗口 ${monitorStatus.window_sec}s`;
      }
    }

    function renderCategories() {
      const bar = document.getElementById("categoryBar");
      bar.innerHTML = "";
      for (const c of categories) {
        const div = document.createElement("div");
        div.className = "category-card";
        div.innerHTML = `
          <div class="category-title">${c.name} <span class="muted">(${c.modules.length})</span></div>
          <div class="actions">
            <button onclick="startCategory('${c.id}')">启动此分类</button>
            <button class="stop" onclick="stopCategory('${c.id}')">停止此分类</button>
            <button class="secondary" onclick="selectCategory('${c.id}')">勾选此分类</button>
          </div>`;
        bar.appendChild(div);
      }
    }

    function renderRecorder() {
      const modes = document.getElementById("recorderModes");
      const domainInput = document.getElementById("recorderDomain");
      const nameInput = document.getElementById("recorderName");
      const startButton = document.getElementById("recorderStart");
      const stopButton = document.getElementById("recorderStop");
      const state = document.getElementById("recorderState");
      const running = ["starting", "running", "stopping"].includes(recorderStatus.status);

      if (!domainInput.value) domainInput.value = recorderStatus.default_domain_id ?? 20;
      if (!nameInput.value) nameInput.value = `record_${new Date().toISOString().slice(0, 10).replaceAll("-", "")}`;

      const currentMode = document.querySelector("input[name='recorderMode']:checked")?.value
        || recorderStatus.mode
        || recorderStatus.modes?.[0]?.id
        || "sensors";
      modes.innerHTML = (recorderStatus.modes || []).map(mode => `
        <label title="${escapeHtml((mode.topics || []).join(', '))}">
          <input type="radio" name="recorderMode" value="${escapeHtml(mode.id)}" ${mode.id === currentMode ? "checked" : ""} ${running ? "disabled" : ""} />
          ${escapeHtml(mode.name)}
        </label>
      `).join("");

      startButton.disabled = !recorderStatus.enabled || running;
      stopButton.disabled = !running;
      domainInput.disabled = running;
      nameInput.disabled = running;

      const parts = [
        `状态：${recorderStatus.status || "unknown"}`,
        `剩余空间：${Number(recorderStatus.free_gb || 0).toFixed(1)} GB`,
        `最低要求：${Number(recorderStatus.min_free_gb || 0).toFixed(1)} GB`,
      ];
      if (recorderStatus.pid) parts.push(`PID：${recorderStatus.pid}`);
      if (recorderStatus.output_path) parts.push(`保存：${recorderStatus.output_path}`);
      if (recorderStatus.started_at) parts.push(`开始：${recorderStatus.started_at}`);
      state.textContent = parts.join(" ｜ ");
    }

    function renderLogFilterOptions() {
      const select = document.getElementById("logFilter");
      const current = select.value || logFilter;
      const options = [
        { id: "all", name: "全部日志" },
        { id: "system", name: "system" },
        { id: "config", name: "config" },
        { id: "recorder", name: "数据录制" },
        ...uniqueHosts().map(h => ({ id: `${h.id}:system`, name: `${h.name} / system` })),
        ...modules.map(m => ({ id: m.id, name: `${m.host_name ? `${m.host_name} / ` : ""}${m.name} (${m.id})` })),
      ];
      select.innerHTML = options
        .map(item => `<option value="${escapeHtml(item.id)}">${escapeHtml(item.name)}</option>`)
        .join("");
      logFilter = options.some(item => item.id === current) ? current : "all";
      select.value = logFilter;
    }

    function renderModules() {
      const tbody = document.getElementById("moduleRows");
      tbody.innerHTML = "";
      let currentHost = null;
      for (const m of modules) {
        const hostKey = m.host_id || "local";
        if (hostKey !== currentHost) {
          currentHost = hostKey;
          tbody.appendChild(hostSectionRow(m));
        }
        const tr = document.createElement("tr");
        const disabled = m.offline ? "disabled" : "";
        tr.innerHTML = `
          <td data-label="选择"><input type="checkbox" ${disabled} ${selected.has(m.id) ? "checked" : ""} onchange="setSelected('${m.id}', this.checked)" /></td>
          <td data-label="主机">${escapeHtml(m.host_name || "-")}</td>
          <td data-label="模块"><div>${escapeHtml(m.name)}</div><div class="muted">${m.id}</div></td>
          <td data-label="分类"><span class="pill ${m.category}">${categoryLabels[m.category] || m.category}</span></td>
          <td data-label="Domain">${m.domain_id ?? "-"}</td>
          <td data-label="状态"><span class="status ${m.status}">${m.status}</span></td>
          <td data-label="频率">${formatRates(m.id)}</td>
          <td data-label="PID">${m.pid ?? "-"}</td>
          <td data-label="依赖" class="muted">${(m.depends_on || []).join(", ") || "-"}</td>
          <td data-label="操作" class="module-actions">
            <div class="action-buttons">
              <button ${disabled} onclick="startOne('${m.id}')">启动</button>
              <button ${disabled} class="stop" onclick="stopOne('${m.id}')">停止</button>
              <button ${disabled} class="restart" onclick="restartOne('${m.id}')">重启</button>
            </div>
          </td>`;
        tbody.appendChild(tr);
      }
    }

    function hostSectionRow(module) {
      const hostModules = modules.filter(m => (m.host_id || "local") === (module.host_id || "local"));
      const running = hostModules.filter(m => ["starting", "running", "stopping"].includes(m.status)).length;
      const offline = hostModules.some(m => m.offline);
      const tr = document.createElement("tr");
      tr.className = "host-section-row";
      tr.innerHTML = `
        <td colspan="10">
          <div class="host-section">
            <div class="host-section-title">${escapeHtml(module.host_name || "本机")}</div>
            <div class="host-section-meta">${offline ? "离线" : `${running}/${hostModules.length} 运行中`}</div>
          </div>
        </td>`;
      return tr;
    }

    function uniqueHosts() {
      const byId = new Map();
      modules.forEach(m => {
        if (m.host_id) byId.set(m.host_id, { id: m.host_id, name: m.host_name || m.host_id });
      });
      return [...byId.values()];
    }

    function formatRates(moduleId) {
      const items = rates.filter(r => r.module === moduleId);
      if (items.length === 0) return '<span class="muted">-</span>';
      return items.map(r => {
        const topic = escapeHtml(r.topic);
        if (r.status === "inactive") {
          return `<div class="muted" title="${escapeHtml(r.message || '')}">${topic}: 未运行</div>`;
        }
        if (r.status === "unexpected_publisher") {
          return `<div class="rate-bad" title="${escapeHtml(r.message || '')}">${topic}: 异常发布 ${Number(r.hz).toFixed(2)} Hz</div>`;
        }
        if (r.hz === null || r.hz === undefined) {
          return `<div class="rate-bad" title="${escapeHtml(r.message || '')}">${topic}: -- Hz</div>`;
        }
        return `<div class="rate-ok">${topic}: ${Number(r.hz).toFixed(2)} Hz</div>`;
      }).join("");
    }

    function setSelected(id, checked) {
      checked ? selected.add(id) : selected.delete(id);
    }
    function toggleAll(checked) {
      selected.clear();
      if (checked) modules.filter(m => !m.offline).forEach(m => selected.add(m.id));
      renderModules();
    }
    function selectAll() { toggleAll(true); }
    function clearSelection() { selected.clear(); renderModules(); }
    function selectAutostart() {
      selected.clear();
      modules.filter(m => m.autostart && !m.offline).forEach(m => selected.add(m.id));
      renderModules();
    }
    function selectCategory(category) {
      selected.clear();
      const item = categories.find(c => c.id === category);
      if (item) {
        item.modules.forEach(id => selected.add(id));
      } else {
        modules.filter(m => (m.category_key || m.category) === category).forEach(m => selected.add(m.id));
      }
      renderModules();
    }

    async function startOne(id) { await runAction(`启动 ${id}`, () => api(`/api/modules/${id}/start`, { method: "POST" })); }
    async function stopOne(id) { await runAction(`停止 ${id}`, () => api(`/api/modules/${id}/stop`, { method: "POST" })); }
    async function restartOne(id) { await runAction(`重启 ${id}`, () => api(`/api/modules/${id}/restart`, { method: "POST" })); }
    async function startCategory(category) { await runAction(`启动分类 ${category}`, () => api(`/api/categories/${category}/start`, { method: "POST" })); }
    async function stopCategory(category) { await runAction(`停止分类 ${category}`, () => api(`/api/categories/${category}/stop`, { method: "POST" })); }
    async function startSelected() {
      await runAction("启动勾选模块", () => api("/api/start-selected", { method: "POST", body: JSON.stringify({ modules: [...selected] }) }));
    }
    async function stopSelected() {
      await runAction("停止勾选模块", () => api("/api/stop-selected", { method: "POST", body: JSON.stringify({ modules: [...selected] }) }));
    }

    async function startRecorder() {
      const mode = document.querySelector("input[name='recorderMode']:checked")?.value || "sensors";
      const domainId = Number(document.getElementById("recorderDomain").value || recorderStatus.default_domain_id || 20);
      const name = document.getElementById("recorderName").value || mode;
      await runAction("开始录制", async () => {
        recorderStatus = await api("/api/recorder/start", {
          method: "POST",
          body: JSON.stringify({ mode, domain_id: domainId, name }),
        });
        renderRecorder();
      });
    }

    async function stopRecorder() {
      await runAction("停止录制", async () => {
        recorderStatus = await api("/api/recorder/stop", { method: "POST" });
        renderRecorder();
      });
    }

    function clearLogs() {
      logEntries = [];
      document.getElementById("logs").innerHTML = "";
    }
    function setLogFilter(value) {
      logFilter = value;
      renderLogs();
    }
    function matchesLogFilter(payload) {
      return logFilter === "all" || payload.module === logFilter || (!payload.module.includes(":") && payload.module === logFilter);
    }
    function renderLogs() {
      const logs = document.getElementById("logs");
      logs.innerHTML = "";
      logEntries.filter(matchesLogFilter).forEach(appendLogLine);
      logs.scrollTop = logs.scrollHeight;
    }
    function appendLog(payload) {
      logEntries.push(payload);
      while (logEntries.length > 1000) logEntries.shift();
      if (matchesLogFilter(payload)) appendLogLine(payload);
    }
    function appendLogLine(payload) {
      const logs = document.getElementById("logs");
      const div = document.createElement("div");
      div.className = "log-line";
      div.innerHTML = `<span class="muted">${payload.time}</span> <span class="module">[${payload.module}]</span> ${escapeHtml(payload.message)}`;
      logs.appendChild(div);
      while (logs.children.length > 1000) logs.removeChild(logs.firstChild);
      logs.scrollTop = logs.scrollHeight;
    }
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    function connectWs() {
      const ws = new WebSocket(`${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws/events`);
      ws.onopen = () => document.getElementById("wsState").textContent = "实时日志已连接";
      ws.onmessage = (ev) => {
        const payload = JSON.parse(ev.data);
        appendLog(payload);
        if (payload.module === "recorder" && payload.event !== "log") loadRecorderStatus();
        if (payload.event !== "log") scheduleModuleRefresh();
      };
      ws.onclose = () => {
        document.getElementById("wsState").textContent = "连接断开，重连中...";
        setTimeout(connectWs, 1500);
      };
    }

    function scheduleModuleRefresh() {
      if (moduleRefreshTimer !== null) return;
      moduleRefreshTimer = setTimeout(async () => {
        moduleRefreshTimer = null;
        try {
          await loadModules();
        } catch (e) {
          appendLog({ time: new Date().toLocaleTimeString(), module: "system", message: `状态刷新失败: ${formatError(e)}` });
        }
      }, 300);
    }

    refreshAll();
    loadConfigCheck(false);
    connectWs();
    setInterval(loadSensorRates, 1000);
    setInterval(loadRecorderStatus, 2000);
  </script>
</body>
</html>
